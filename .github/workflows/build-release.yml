name: Build Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Build with PowerShell
      shell: powershell
      run: |
        .\build.ps1

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: dist/Shutter.exe
