name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  check:
    if: "!contains(github.event.head_commit.message, '[skip release]')"
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      skip: ${{ steps.tag_check.outputs.exists }}
      notes_file: ${{ steps.notes.outputs.file }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from code
        id: version
        run: |
          version=$(grep -oE 'AssemblyVersion\("[0-9]+\.[0-9]+\.[0-9]+' src/Shutter.cs | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: tag_check
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release notes
        id: notes
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          file=release_notes.md
          prev=$(git tag -l 'v*' --sort=-v:refname | grep -v "${{ steps.version.outputs.tag }}" | head -1)
          echo "## Changes" > "$file"
          echo >> "$file"
          if [[ -z "$prev" ]]; then
            git log --no-merges --pretty=format:'- %s (%h)' >> "$file"
          else
            git log --no-merges --pretty=format:'- %s (%h)' "$prev..HEAD" >> "$file"
          fi
          echo "file=$file" >> "$GITHUB_OUTPUT"

      - name: Upload release notes
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: ${{ steps.notes.outputs.file }}

  build-and-release:
    needs: check
    if: needs.check.outputs.skip == 'false'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        shell: powershell
        run: .\build.ps1

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.check.outputs.tag }}"
          git push origin "${{ needs.check.outputs.tag }}"

      - name: Create Release with Exe
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check.outputs.tag }}
          body_path: release_notes.md
          files: dist/Shutter.exe
