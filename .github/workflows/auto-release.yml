name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip release]')"
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from code
        id: version
        shell: bash
        run: |
          set -euo pipefail
          # Extract version from AssemblyVersion in Shutter.cs
          version=$(grep -oP '(?<=AssemblyVersion\(")[^"]+' src/Shutter.cs | head -1)
          # Remove trailing .0 if present (1.0.7.0 -> 1.0.7)
          version=${version%.*}
          tag="v$version"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: tag_check
        shell: bash
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          file=release_notes.md
          echo "## Changes" > "$file"
          echo >> "$file"
          
          # Find previous tag
          latest=$(git tag -l 'v*' --sort=-v:refname | grep -v "${{ steps.version.outputs.tag }}" | head -n 1)
          
          if [[ -z "$latest" ]]; then
            git log --no-merges --pretty=format:'- %s (%h)' >> "$file"
          else
            git log --no-merges --pretty=format:'- %s (%h)' "$latest..HEAD" >> "$file"
          fi
          
          echo "file=$file" >> "$GITHUB_OUTPUT"

      - name: Build with PowerShell
        if: steps.tag_check.outputs.exists == 'false'
        shell: powershell
        run: |
          .\build.ps1

      - name: Create and push tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release with Exe
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          body_path: ${{ steps.notes.outputs.file }}
          files: dist/Shutter.exe
